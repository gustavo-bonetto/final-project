<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SISTEMA PRO</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="container-header">
        <div class="header-info">
          <h1>SISTEMA PRO</h1>
          <p class="subtitle">Sistema de Gestão de Inventário</p>
        </div>

        <nav class="header-nav">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="cadastro.html">Cadastro</a></li>
            <li><a href="sobre.html">Sobre nós</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        <section class="form-section">
          <h2>Adicionar ou Editar Produto</h2>
          <form id="productForm">
            <div class="form-group">
              <label for="nomep">Nome do Produto:</label>
              <input type="text" id="nomep" name="nomep" placeholder="Ex: Teclado Mecânico RGB" required />
            </div>

            <div class="form-group">
              <label for="preco">Preço (R$):</label>
              <input type="number" step="0.01" id="preco" name="preco" placeholder="0.00" required />
            </div>

            <div class="form-group">
              <label for="estoque">Quantidade em Estoque:</label>
              <input type="number" id="estoque" name="estoque" placeholder="Ex: 50" required />
            </div>

            <div class="form-group">
              <label for="categoria">Categoria:</label>
              <input type="text" id="categoria" name="categoria" placeholder="Ex: Periféricos" required />
            </div>

            <div class="form-buttons">
              <button type="submit" class="btn btn-primary">Salvar Produto</button>
              <button type="button" class="btn btn-secondary" id="btnLimpar">Limpar Formulário</button>
            </div>
          </form>
        </section>

        <section class="list-section">
          <h2>Lista de Produtos</h2>
          <div class="list-controls">
            <button class="btn btn-success" id="btnRecarregar">🔄 Recarregar Lista</button>
            <div class="search-box">
              <select id="searchType">
                <option value="nomep">Buscar por Nome</option>
                <option value="id">Buscar por ID</option>
                <option value="categoria">Buscar por Categoria</option>
              </select>
              <input type="text" id="searchInput" placeholder="Digite o valor para buscar..." />
              <button class="btn btn-primary" id="btnBuscar">Buscar</button>
            </div>
          </div>
          <div id="loadingMessage" class="message message-info">Carregando produtos...</div>
          <div id="emptyMessage" class="message message-info">Nenhum produto cadastrado no sistema.</div>
          <div id="productsList" class="clients-table-container"></div>
        </section>
      </div>
    </main>

    <footer class="footer-geral">
    <div class="container-footer">
        <div class="footer-content">
            <p>&copy; 2026 <strong>SISTEMA PRO</strong> </p>
            <p class="footer-dev">Desenvolvido pelos Men's Caves</p>
        </div>
    </div>
</footer>

    <script src="script.js"></script>
  </body>
</html>
